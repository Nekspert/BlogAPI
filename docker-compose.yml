services:
  api:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: blog_api
    ports:
      - "${RUN_PORT:-8000}:${RUN_PORT:-8000}"
    env_file:
      - app/.env
    environment:
      - POSTGRES_HOST=db
      - REDIS_HOST=redis
      - RUN_HOST=0.0.0.0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

    command: >
      bash -lc "alembic upgrade head &&
      uvicorn app.api.main:main_app --host $$RUN_HOST --port $$RUN_PORT --reload"

  db:
    image: postgres:10
    container_name: postgres
    restart: unless-stopped
    env_file: app/.env
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: redis
    restart: unless-stopped
    env_file: app/.env
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  pgdata:
  redis_data: